<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2A6D" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#05D9E8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0E1420" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#060A12"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Left Pink Traces (#FF2A6D) -->
  <g stroke="#FF2A6D" stroke-width="2" fill="none">
    <polyline points="0,160 180,160 180,300 280,300"/>
    <circle cx="280" cy="300" r="4" fill="#FF2A6D" stroke="none"/>

    <polyline points="0,440 140,440 140,520 260,520"/>
    <circle cx="260" cy="520" r="4" fill="#FF2A6D" stroke="none"/>

    <!-- DIP chip silhouette -->
    <rect x="210" y="350" width="60" height="40" rx="2"/>
    <line x1="210" y1="358" x2="190" y2="358"/>
    <line x1="210" y1="366" x2="190" y2="366"/>
    <line x1="210" y1="374" x2="190" y2="374"/>
    <line x1="210" y1="382" x2="190" y2="382"/>
    <line x1="270" y1="358" x2="290" y2="358"/>
    <line x1="270" y1="366" x2="290" y2="366"/>
    <line x1="270" y1="374" x2="290" y2="374"/>
    <line x1="270" y1="382" x2="290" y2="382"/>
  </g>

  <!-- Right Cyan Traces (#05D9E8) -->
  <g stroke="#05D9E8" stroke-width="2" fill="none">
    <polyline points="1280,200 1000,200 1000,340 920,340"/>
    <circle cx="920" cy="340" r="4" fill="#05D9E8" stroke="none"/>

    <polyline points="1280,460 1080,460 1080,540 980,540"/>
    <circle cx="980" cy="540" r="4" fill="#05D9E8" stroke="none"/>

    <!-- DIP chip silhouette -->
    <rect x="950" y="140" width="60" height="40" rx="2"/>
    <line x1="950" y1="148" x2="930" y2="148"/>
    <line x1="950" y1="156" x2="930" y2="156"/>
    <line x1="950" y1="164" x2="930" y2="164"/>
    <line x1="950" y1="172" x2="930" y2="172"/>
    <line x1="1010" y1="148" x2="1030" y2="148"/>
    <line x1="1010" y1="156" x2="1030" y2="156"/>
    <line x1="1010" y1="164" x2="1030" y2="164"/>
    <line x1="1010" y1="172" x2="1030" y2="172"/>
  </g>

  <!-- Center Core Glow -->
  <circle cx="640" cy="300" r="120" fill="url(#coreGlow)"/>

  <!-- Subtle concentric rings behind text -->
  <g stroke="#FF2A6D" stroke-width="1" fill="none" opacity="0.15">
    <circle cx="640" cy="300" r="40"/>
    <circle cx="640" cy="300" r="70"/>
    <circle cx="640" cy="300" r="100"/>
  </g>
  <g stroke="#05D9E8" stroke-width="0.5" fill="none" opacity="0.15">
    <circle cx="640" cy="300" r="55"/>
    <circle cx="640" cy="300" r="85"/>
  </g>

  <!-- Rising Cyan Arcs (collision zone) -->
  <g stroke="#05D9E8" fill="none" stroke-linecap="round">
    <path d="M 520 640 Q 640 520 760 640" stroke-width="2" opacity="0.5"/>
    <path d="M 480 640 Q 640 480 800 640" stroke-width="2" opacity="0.35"/>
    <path d="M 440 640 Q 640 440 840 640" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Pink Energy Droplets raining down -->
  <g fill="#FF2A6D">
    <ellipse cx="560" cy="90" rx="6" ry="14" opacity="0.9"/>
    <ellipse cx="600" cy="120" rx="8" ry="22" opacity="1"/>
    <ellipse cx="640" cy="100" rx="6" ry="14" opacity="0.9"/>
    <ellipse cx="590" cy="70" rx="4" ry="8" opacity="0.7"/>
    <ellipse cx="620" cy="140" rx="5" ry="10" opacity="0.8"/>
    <ellipse cx="640" cy="60" rx="3" ry="6" opacity="0.6"/>
  </g>

  <!-- Radiating impact spikes -->
  <g stroke-width="1.5" stroke-linecap="round">
    <line x1="640" y1="300" x2="640" y2="240" stroke="#FF2A6D" opacity="0.8"/>
    <line x1="640" y1="300" x2="640" y2="360" stroke="#05D9E8" opacity="0.8"/>
    <line x1="640" y1="300" x2="580" y2="300" stroke="#05D9E8" opacity="0.8"/>
    <line x1="640" y1="300" x2="700" y2="300" stroke="#FF2A6D" opacity="0.8"/>
    <line x1="640" y1="300" x2="590" y2="250" stroke="#FF2A6D" opacity="0.6"/>
    <line x1="640" y1="300" x2="690" y2="250" stroke="#05D9E8" opacity="0.6"/>
    <line x1="640" y1="300" x2="590" y2="350" stroke="#05D9E8" opacity="0.6"/>
    <line x1="640" y1="300" x2="690" y2="350" stroke="#FF2A6D" opacity="0.6"/>
  </g>

  <!-- Typography -->
  <text x="640" y="310" font-family="Arial Black, Impact, sans-serif" font-size="68" fill="#FFFFFF" text-anchor="middle" font-weight="bold" letter-spacing="2">ELECTRONICS</text>

  <text x="640" y="360" font-family="Courier New, monospace" font-size="24" fill="#05D9E8" text-anchor="middle" letter-spacing="6">DESIGN PORTFOLIO</text>

  <text x="640" y="400" font-family="Courier New, monospace" font-size="18" fill="#FF2A6D" text-anchor="middle">KiCAD · LibrePCB · Ngspice · Qucs-s</text>

  <text x="640" y="590" font-family="Arial, sans-serif" font-size="14" fill="#4A5B7C" text-anchor="middle" letter-spacing="3">SIMULATION · PCB DESIGN · LOGIC</text>

  <!-- Decorative cyan nodes -->
  <circle cx="520" cy="420" r="3" fill="#05D9E8" opacity="0.8"/>
  <circle cx="760" cy="420" r="3" fill="#05D9E8" opacity="0.8"/>
</svg>
